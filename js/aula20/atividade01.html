<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form id="product-form">
      <input type="text" id="name" placeholder="Nome do produto" />
      <input type="text" id="description" placeholder="Descrição do produto" />
      <input type="number" id="price" placeholder="Preço do produto" />
      <input
        type="text"
        id="image-url"
        placeholder="URL da imagem do produto"
      />
      <button type="submit">Cadastrar Produto</button>
      <div id="error-price" style="color: red"></div>
      <div id="error-name" style="color: red"></div>
    </form>
    <div id="product-container"></div>

    <script src="atividade01.js"></script>
  </body>
</html>
